[phases.setup]
nixPkgs = ['php83', 'php83Extensions.mbstring', 'php83Extensions.pdo', 'php83Extensions.pdo_sqlite', 'php83Extensions.tokenizer', 'php83Extensions.xml', 'php83Extensions.ctype', 'php83Extensions.fileinfo', 'php83Extensions.curl', 'php83Packages.composer', 'nodejs_20', 'npm-10_x']

[phases.install]
cmds = [
    'mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs',
    'mkdir -p database',
    'touch database/database.sqlite',
    'chmod -R 775 storage bootstrap/cache'
]

[phases.build]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
    'npm install',
    'npm run build'
]

[start]
cmd = 'php artisan migrate --force && php -d variables_order=EGPCS -S 0.0.0.0:$PORT -t public/'
